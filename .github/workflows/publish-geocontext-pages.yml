name: Publish geocontext report

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-geocontext-pages.yml
      - docs/geocontext/index.html
      - docs/geocontext/robots.txt
      - docs/geocontext/current_landscape_model/**
      - docs/geocontext/acceptance_framework/**
      - docs/geocontext/landskapsanalys_bornholm_handledarrapport.html
      - docs/geocontext/maps/**
      - docs/geocontext/tables/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          site_dir="$RUNNER_TEMP/pages-site"
          mkdir -p "$site_dir"

          cp docs/geocontext/index.html "$site_dir/index.html"
          cp docs/geocontext/robots.txt "$site_dir/robots.txt"
          cp docs/geocontext/landskapsanalys_bornholm_handledarrapport.html "$site_dir/landskapsanalys_bornholm_handledarrapport.html"
          cp -R docs/geocontext/current_landscape_model "$site_dir/current_landscape_model"
          cp -R docs/geocontext/acceptance_framework "$site_dir/acceptance_framework"
          cp -R docs/geocontext/maps "$site_dir/maps"
          cp -R docs/geocontext/tables "$site_dir/tables"
          touch "$site_dir/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
